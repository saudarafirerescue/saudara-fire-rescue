<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Berita</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="detail-berita">
    <div class="container-detail" id="detailContainer">
        Loading...
    </div>
</section>

<script>
const sheetURL = "https://opensheet.elk.sh/1wj9iSetBFM1dcvdS5iF-t0eWEz7T-qjIcfj-XqW5icQ/Sheet1";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("detailContainer");

    const berita = data.find(item => item.id === id);

    if(berita){
      container.innerHTML = `
        <h1>${berita.judul}</h1>
        <p class="tanggal-detail">${berita.tanggal}</p>
        <img src="${berita.gambar}" alt="">
        <p>${berita.isi}</p>
        <a href="semua-berita.html#berita" class="kembali">← Kembali</a>
      `;
    } else {
      container.innerHTML = "<h2>Berita tidak ditemukan</h2>";
    }

  });
</script>

</body>
</html>
