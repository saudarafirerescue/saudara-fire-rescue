<script>
const sheetURL = "https://opensheet.elk.sh/1wj9iSetBFM1dcvdS5iF-t0eWEz7T-qjIcfj-XqW5icQ/Sheet1";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("detailContainer");

    const berita = data.find(item => item.id === id);

    if(berita){
      container.innerHTML = `
        <h1>${berita.judul}</h1>
        <p>${berita.tanggal}</p>
        <img src="${berita.gambar}">
        <p>${berita.isi}</p>
        <a href="index.html#berita">← Kembali</a>
      `;
    } else {
      container.innerHTML = "Berita tidak ditemukan";
    }

  });
</script>
